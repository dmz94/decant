<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decant</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="page-wrapper">

  <header class="site-header">
    <h1 class="site-title">Decant</h1>
  </header>

  <main class="container">

    <section id="input-zone" class="input-zone">
      <form id="url-form" class="url-form">
        <input type="text" id="url-input" name="url"
               placeholder="Paste a URL..." autocomplete="off">
        <button type="submit">Convert</button>
      </form>

      <div class="or-divider">or</div>

      <div id="drop-zone" class="drop-zone">
        <p>Drop an HTML file here, or click to browse</p>
        <input type="file" id="file-input" accept=".html,.htm" hidden>
      </div>
    </section>

    <div id="error" class="error-container hidden">
      <p class="error-message" id="error-message"></p>
      <p class="error-hint" id="error-hint"></p>
    </div>

    <div id="converting" class="converting-status hidden">
      Converting...
    </div>

    <section id="output" class="output-zone hidden">

      <div id="toolbar-container" class="toolbar-container">
        <div class="toolbar">

          <!-- Text controls -->
          <ul class="dropdown text-dropdown">
            <li>
              <button class="dropdown-toggle toolbar-button text-button"
                      aria-label="Text and layout settings">
                <span class="tb-icon-aa">Aa</span>
                <span class="hover-label">Text</span>
              </button>
            </li>
            <li class="dropdown-popup" id="text-controls" tabindex="-1">
              <!-- populated in chunk 4b -->
            </li>
          </ul>

          <!-- Theme picker -->
          <ul class="dropdown theme-dropdown">
            <li>
              <button class="dropdown-toggle toolbar-button theme-button"
                      aria-label="Theme">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <rect x="2" y="2" width="12" height="12" rx="4"/>
                </svg>
                <span class="hover-label">Theme</span>
              </button>
            </li>
            <li class="dropdown-popup" id="theme-controls" tabindex="-1">
              <!-- populated in chunk 4c -->
            </li>
          </ul>

          <!-- Save -->
          <ul class="dropdown save-dropdown">
            <li>
              <button class="dropdown-toggle toolbar-button save-button"
                      aria-label="Save and print">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 2v8M5 7l3 3 3-3"/>
                  <path d="M3 12h10"/>
                </svg>
                <span class="hover-label">Save</span>
              </button>
            </li>
            <li class="dropdown-popup" id="save-controls" tabindex="-1">
              <!-- populated in chunk 4d -->
            </li>
          </ul>

          <!-- Share (single action, URL only) -->
          <button class="toolbar-button share-button url-only"
                  id="share-btn"
                  aria-label="Copy share link">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 10V2M5 5l3-3 3 3"/>
              <path d="M13 10v3H3v-3"/>
            </svg>
            <span class="hover-label">Share</span>
          </button>

          <!-- View Original (single action, URL only) -->
          <button class="toolbar-button view-original-button url-only"
                  id="view-original-btn"
                  aria-label="View original page">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2H2v12h12v-4"/>
              <path d="M9 2h5v5"/>
              <path d="M7 9L14 2"/>
            </svg>
            <span class="hover-label">View Original</span>
          </button>

          <!-- Help -->
          <ul class="dropdown help-dropdown">
            <li>
              <button class="dropdown-toggle toolbar-button help-button"
                      aria-label="Help and feedback">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                     stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="8" cy="8" r="6"/>
                  <path d="M6 6a2 2 0 1 1 2.5 1.94c-.39.2-.5.46-.5.81V10"/>
                  <circle cx="8" cy="12" r="0.5" fill="currentColor" stroke="none"/>
                </svg>
                <span class="hover-label">Help</span>
              </button>
            </li>
            <li class="dropdown-popup" id="help-controls" tabindex="-1">
              <!-- populated in chunk 5 -->
            </li>
          </ul>

        </div>
      </div>

      <iframe id="output-frame" sandbox="allow-same-origin"></iframe>
    </section>

  </main>


</div>

<script src="/static/app.js"></script>
{% if prefilled_url %}
<script>window.__prefilled_url = {{ prefilled_url | tojson }};</script>
{% endif %}
</body>
</html>
